<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wheel Of Surprises</title>

<link rel="stylesheet" href="wheel.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="particles"></div>

<div class="container">

    <div class="glass">

        <h3 class="welcome">

            ✨ Welcome To

        </h3>

        <h1>

            The Wheel Of

            <br>

            Surprises ❤️

        </h1>

        <p>

            Every spin...

            <br>

            hides

            <br>

            a beautiful surprise.

        </p>

        <div class="wheel-area">

            <div class="pointer">
                ▼
            </div>

            <div id="wheel">

                <div class="center">

                    SPIN

                </div>

            </div>

        </div>

        <button id="spinBtn">

            🎡 Spin The Wheel

        </button>

    </div>

</div>

<!-- Better Luck Popup -->

<div id="popup">

<div class="popup-card">

<h1>

😂

</h1>

<h2>

Better Luck

Next Time

</h2>

<p>

Oops...

Looks like

you didn't win...

😜

</p>

</div>

</div>

<script src="wheel.js"></script>

</body>

</html>
