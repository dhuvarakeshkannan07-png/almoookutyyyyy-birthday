<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Bonus Reward Wheel</title>

<link rel="stylesheet" href="reward.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="container">

<div class="glass">

<h3>

🎁 BONUS ROUND

</h3>

<h1>

Reward Collection

</h1>

<p>

Every reward

contains

a beautiful surprise ❤️

</p>

<div class="progress-box">

<div class="progress-title">

Rewards Collected

</div>

<div id="counter">

0 / 8

</div>

</div>

<div class="wheel-area">

<div class="pointer">

▼

</div>

<div id="rewardWheel">

<div class="center">

SPIN

</div>

</div>

</div>

<button id="rewardSpin">

🎡 Collect Reward

</button>

</div>

</div>

<script src="reward.js"></script>

</body>

</html>
